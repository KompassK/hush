<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#efe6d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hush">
  <link rel="manifest" href="./manifest.json">
  <title>Hush</title>
  <style>
    :root {
      /* warm, soft, low-contrast palette */
      --bg-top: #f4ece0;
      --bg-bottom: #ece1cf;
      --ink: #9c8f7a;          /* faint — used only for incidental tint */
      --ink-strong: #5d513c;   /* clearly legible warm brown for text + controls */
      /* compact header / footer bars; the board fits the height between them */
      --header-h: 50px;
      --footer-h: 62px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;     /* centre the board-width shell on wide screens */
      /* keep clear of the notch / home indicator */
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    /* ---- Shell: one centred column whose width tracks the board, so the
       header and bottom bar line up directly above and below the board on
       every screen size (never floating out at the viewport edges). The board
       outer width is --cell * 6.098 (6 cells + 7 gaps), so the shell uses the
       same figure and the board fills it exactly. */
    #shell {
      --cell: min(
        calc((100vw - 32px) / 6.098),
        calc((100dvh - var(--header-h) - var(--footer-h)
               - env(safe-area-inset-top) - env(safe-area-inset-bottom)
               - 24px) / 12.182)
      );
      width: calc(var(--cell) * 6.098);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header bar: clock (left) · title (centre) · info + settings (right) ---- */
    #bar-top {
      flex: 0 0 auto;
      height: var(--header-h);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }
    /* Left group: clock at the board's edge, stats icon nestled by the title. */
    .hud-left {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hud-clock {
      font-size: 15px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: var(--ink-strong);
      opacity: 0.75;            /* legible, but easy to ignore */
    }
    .hud-title {
      justify-self: center;
      padding: 0 12px;          /* keep the flanking icons off the title */
      font-size: 23px;
      font-weight: 600;
      letter-spacing: 0.10em;
      color: var(--ink-strong);
    }
    .hud-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hud-icon {
      font: inherit;
      line-height: 1;
      color: var(--ink-strong);
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    .hud-icon:active { opacity: 0.6; }
    .hud-gear { font-size: 19px; }
    /* Small circled "i", sized to match the gear so the header stays tidy. The
       upright (non-italic) letter sits centred and clear at this size. */
    .hud-info {
      width: 19px;
      height: 19px;
      border: 1.5px solid currentColor;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    /* Stats / graph: small bar-chart glyph, drawn in the theme ink. */
    .hud-graph { display: flex; }
    .hud-graph svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    /* ---- Board stage: takes all the height left between the two bars ---- */
    #stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Bottom control bar: Pause + Stop ---- */
    #bar-bottom {
      flex: 0 0 auto;
      height: var(--footer-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    /* Equal-width footer buttons (sized for the longest label, "Resume"), so the
       shorter "Stop" matches the Pause button and the pair stays steady. */
    #bar-bottom .ctrl {
      min-width: 7rem;
      text-align: center;
    }
    .ctrl {
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink-strong);
      background: rgba(255, 255, 255, 0.62);
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      box-shadow: 0 1px 3px rgba(92, 76, 56, 0.16);
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    .ctrl:active { background: rgba(255, 255, 255, 0.85); }

    /* A quietly paused board: dimmed a touch, no overlay clutter. */
    #stage.paused #game { opacity: 0.45; transition: opacity 200ms ease; }

    /* ---- Settings stub panel & end screen: calm full-screen surfaces ---- */
    .surface {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      padding:
        calc(env(safe-area-inset-top) + 24px) 24px
        calc(env(safe-area-inset-bottom) + 24px);
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--ink);
    }
    .surface[hidden] { display: none; }
    .surface h2 {
      margin: 0;
      font-size: 23px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink-strong);
    }
    .surface p {
      margin: 0;
      max-width: 19rem;
      font-size: 17px;
      line-height: 1.55;
      letter-spacing: 0.01em;
      text-align: center;
      color: var(--ink-strong);
    }
    .endscreen p {
      font-size: 18px;
      letter-spacing: 0.04em;
    }

    /* ---- Board ----
       6 columns wide x 12 rows tall. Sized natively with CSS only. Never use a
       JS transform: scale() on a fixed-width wrapper — that breaks pointer
       coords + position:fixed drags.

       The board is taller than wide, so the limiting dimension may be width OR
       height depending on the phone. We size a single square --cell to the
       SMALLER of (available width / 6) and (available height / 12), leaving a
       ~16px gutter on every edge. The divisors include the gaps + padding
       (each = --cell * 0.014): width = cell*(6 + 7*g), height = cell*(12 + 13*g),
       so the whole board always fits with no overflow and no zoom.

       The available height now excludes the header + footer bars and the safe
       areas, so no rows clip and no zoom is ever needed. */
    #game {
      --cols: 6;
      --rows: 12;
      /* --cell is defined on #shell and inherited here, so the board and the
         shell (header + footer) share exactly one width. */
      --gap: calc(var(--cell) * 0.014);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell));
      grid-template-rows: repeat(var(--rows), var(--cell));
      gap: var(--gap);
      padding: var(--gap);
      /* The board owns all touch gestures so the page never scrolls/zooms
         instead of dragging a tile. */
      touch-action: none;
    }

    /* Very faint chessboard: the same warm background tone nudged a touch
       lighter on one set of cells and a touch darker on the other. No borders,
       outlines, or recesses — it just sits quietly behind the jewels. */
    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell.light { background: #f2ebdf; }
    .cell.dark  { background: #e9dfce; }

    /* Softly three-dimensional jewel: muted, low-gloss, tactile.
       Colour comes from --c (set per cell in JS). Overlays are translucent
       black/white so the facet/highlight works for any base colour. */
    .jewel {
      width: 76%;
      height: 76%;
      border-radius: 30%;
      background:
        radial-gradient(115% 115% at 32% 26%,
          rgba(255, 255, 255, 0.40) 0%,
          rgba(255, 255, 255, 0.06) 38%,
          rgba(255, 255, 255, 0) 60%),
        linear-gradient(148deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(0, 0, 0, 0.00) 42%,
          rgba(0, 0, 0, 0.18) 100%),
        var(--c, #b9a98f);
      box-shadow:
        inset 0 2px 3px rgba(255, 255, 255, 0.30),
        inset 0 -3px 5px rgba(0, 0, 0, 0.20),
        0 3px 5px rgba(92, 76, 56, 0.18);
    }

    /* A lifted (being dragged) jewel: gently deeper shadow. It is moved with
       transform: translate3d(...) only — never left/top — and gets
       will-change to keep iOS from leaving shadow trails. */
    .jewel.lift {
      will-change: transform;
      box-shadow:
        inset 0 2px 3px rgba(255, 255, 255, 0.30),
        inset 0 -3px 5px rgba(0, 0, 0, 0.20),
        0 9px 16px rgba(92, 76, 56, 0.28);
    }

    /* Raise the dragged cell above its neighbours while swapping. */
    .cell.active { z-index: 5; }
  </style>
</head>
<body>
  <!-- One centred column: header, board and bottom bar share the board width. -->
  <div id="shell">
    <header id="bar-top">
      <div class="hud-left">
        <div id="clock" class="hud-clock">0:00</div>
        <button id="stats-btn" class="hud-icon hud-graph" type="button" aria-label="Stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="5"  y1="20" x2="5"  y2="13"></line>
            <line x1="12" y1="20" x2="12" y2="6"></line>
            <line x1="19" y1="20" x2="19" y2="15"></line>
          </svg>
        </button>
      </div>
      <div class="hud-title">Hush</div>
      <div class="hud-actions">
        <button id="info-btn" class="hud-icon hud-info" type="button" aria-label="How to play">i</button>
        <button id="settings-btn" class="hud-icon hud-gear" type="button" aria-label="Settings">&#9881;</button>
      </div>
    </header>

    <main id="stage">
      <div id="game"></div>
    </main>

    <footer id="bar-bottom">
      <button id="pause-btn" class="ctrl" type="button">Pause</button>
      <button id="end-btn" class="ctrl" type="button">Stop</button>
    </footer>
  </div>

  <!-- Settings stub: heading + close only. Real controls come later. -->
  <div id="settings-panel" class="surface" hidden>
    <h2>Settings</h2>
    <button id="settings-close" class="ctrl" type="button">Close</button>
  </div>

  <!-- How to play. -->
  <div id="info-panel" class="surface" hidden>
    <h2>How to play</h2>
    <p>Swap two side-by-side jewels to line up three or more of the same colour. They quietly clear, and new jewels drift in to fill the gaps.</p>
    <p>There's no score, and no winning or losing. Play for as long as you like.</p>
    <button id="info-close" class="ctrl" type="button">Close</button>
  </div>

  <!-- Simple end-of-session screen (the fuller goodbye is refined later). -->
  <div id="end-screen" class="surface endscreen" hidden>
    <p>Rest well.</p>
  </div>

  <script>
    // ---- Configuration ----
    const ROWS = 12; // board is 6 wide x 12 tall
    const COLS = 6;

    // 5 muted, jewel-inspired colours. Easy to change / tune on device.
    const COLORS = [
      '#a85661', // ruby
      '#7d6e99', // amethyst
      '#4f8a6f', // emerald
      '#4f6f99', // sapphire
      '#c29a5b'  // amber
    ];

    // ---- Board state ----
    // board[row][col] = index into COLORS. Clear 2D structure.
    let board = [];

    // Pick a colour index for (r, c) that does NOT complete a run of 3,
    // i.e. avoid matching the two cells already placed to the left or above.
    function pickColorIndex(r, c) {
      const banned = new Set();
      if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
        banned.add(board[r][c - 1]);
      }
      if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
        banned.add(board[r - 1][c]);
      }
      const choices = [];
      for (let i = 0; i < COLORS.length; i++) {
        if (!banned.has(i)) choices.push(i);
      }
      return choices[Math.floor(Math.random() * choices.length)];
    }

    // Build a full 12x6 board guaranteed free of any initial 3-in-a-row.
    function buildBoard() {
      board = [];
      for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
          board[r][c] = pickColorIndex(r, c);
        }
      }
    }

    // ---- Render (data-driven, in-place) ----
    // The 72 cell+jewel elements are created ONCE by mountBoard(). After that we
    // never rebuild the board — we only update the cells whose data changed, via
    // syncCell(), so the DOM always matches board[][] exactly. The upcoming
    // clearing and cascade stages build on this same single-cell update pattern.
    const gameEl = document.getElementById('game');
    const tiles = [];   // tiles[r][c] = the jewel element living in cell (r, c)

    function mountBoard() {
      gameEl.innerHTML = '';
      tiles.length = 0;
      for (let r = 0; r < ROWS; r++) {
        tiles[r] = [];
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
          cell.dataset.row = r;
          cell.dataset.col = c;

          const jewel = document.createElement('div');
          jewel.className = 'jewel';
          jewel.style.setProperty('--c', COLORS[board[r][c]]);

          cell.appendChild(jewel);
          gameEl.appendChild(cell);
          tiles[r][c] = jewel;
        }
      }
    }

    // Make cell (r, c)'s jewel match board[r][c] and rest cleanly in its own
    // cell: repaint its colour and strip any drag/animation transform, easing
    // hints and drag classes. This is the one place that reconciles DOM to data.
    function syncCell(r, c) {
      const jewel = tiles[r][c];
      const v = board[r][c];
      jewel.style.transition = '';
      jewel.style.transform = '';
      jewel.style.willChange = '';
      jewel.classList.remove('lift');
      jewel.parentNode.classList.remove('active');
      if (v === null || v === undefined) {
        // Empty cell: the jewel is hidden, leaving the faint chessboard square.
        jewel.style.opacity = '0';
      } else {
        jewel.style.setProperty('--c', COLORS[v]);
        jewel.style.opacity = '';
      }
    }

    buildBoard();
    mountBoard();

    // ---- Matches ----
    // Scan the whole board for runs of 3+ same-colour tiles (rows and columns).
    // Empty cells (null) never take part. Returns a Set of "r,c" keys.
    function findMatches() {
      const matched = new Set();

      function scanRun(cells) {
        let start = 0;
        for (let i = 1; i <= cells.length; i++) {
          const prev = cells[i - 1].v;
          const cur = i < cells.length ? cells[i].v : null;
          const same = i < cells.length && prev !== null && cur === prev;
          if (!same) {
            if (i - start >= 3 && prev !== null) {
              for (let k = start; k < i; k++) {
                matched.add(cells[k].r + ',' + cells[k].c);
              }
            }
            start = i;
          }
        }
      }

      for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) row.push({ r: r, c: c, v: board[r][c] });
        scanRun(row);
      }
      for (let c = 0; c < COLS; c++) {
        const col = [];
        for (let r = 0; r < ROWS; r++) col.push({ r: r, c: c, v: board[r][c] });
        scanRun(col);
      }
      return matched;
    }

    // Softly dissolve every matched tile (fade + gentle shrink), then empty those
    // cells in the data and reconcile them. Calls done() once all have finished.
    function dissolveMatches(matched, done) {
      const opts = { duration: DISSOLVE_MS, easing: 'ease', fill: 'forwards' };
      let pending = matched.size;
      if (pending === 0) { done(); return; }
      matched.forEach(function (key) {
        const parts = key.split(',');
        const mr = +parts[0], mc = +parts[1];
        const jewel = tiles[mr][mc];
        jewel.style.willChange = 'transform, opacity';
        const anim = jewel.animate([
          { opacity: 1, transform: 'scale(1)' },
          { opacity: 0, transform: 'scale(0.4)' }
        ], opts);
        anim.onfinish = function () {
          anim.cancel();
          board[mr][mc] = null;
          syncCell(mr, mc);
          pending--;
          if (pending === 0) done();
        };
      });
    }

    // ---- Gravity, refill & cascades ----
    // Collapse every column: existing tiles fall to the bottom, then new tiles
    // (random COLORS) fill the empty cells above. Mutates board[][] in place and
    // returns the list of tiles that need to animate, each with the row it should
    // appear to fall FROM (negative rows mean it drifts in from above the top).
    function applyGravity() {
      const moves = [];
      for (let c = 0; c < COLS; c++) {
        // Surviving tiles, bottom-most first.
        const surviving = [];
        for (let r = ROWS - 1; r >= 0; r--) {
          if (board[r][c] !== null && board[r][c] !== undefined) {
            surviving.push({ r: r, v: board[r][c] });
          }
        }
        let dr = ROWS - 1;
        // Drop the survivors into the lowest cells, preserving their order.
        for (let i = 0; i < surviving.length; i++, dr--) {
          const src = surviving[i];
          board[dr][c] = src.v;
          if (src.r !== dr) {
            moves.push({ r: dr, c: c, from: src.r, v: src.v });
          }
        }
        // Refill the remaining cells above, drifting in from over the top.
        let from = -1;
        for (; dr >= 0; dr--, from--) {
          const v = Math.floor(Math.random() * COLORS.length);
          board[dr][c] = v;
          moves.push({ r: dr, c: c, from: from, v: v });
        }
      }
      return moves;
    }

    // Animate the gravity/refill moves: each affected jewel slides down from its
    // source row to its resting cell, then reconciles. Calls done() when settled.
    function animateGravity(moves, done) {
      if (moves.length === 0) { done(); return; }
      const opts = { duration: FALL_MS, easing: 'ease-in', fill: 'forwards' };
      let pending = moves.length;
      moves.forEach(function (m) {
        const jewel = tiles[m.r][m.c];
        jewel.classList.remove('lift');
        jewel.parentNode.classList.remove('active');
        jewel.style.setProperty('--c', COLORS[m.v]);
        jewel.style.opacity = '';
        jewel.style.willChange = 'transform';
        jewel.style.transition = 'none';
        const startY = (m.from - m.r) * drag.step; // negative: starts higher up
        const anim = jewel.animate([
          { transform: 'translate3d(0, ' + startY + 'px, 0)' },
          { transform: 'translate3d(0, 0, 0)' }
        ], opts);
        anim.onfinish = function () {
          anim.cancel();
          syncCell(m.r, m.c);
          pending--;
          if (pending === 0) done();
        };
      });
    }

    // Resolve the board to a stable, full state: clear any matches, drop & refill,
    // then repeat for as long as fresh matches keep appearing. Every clear looks
    // identical regardless of how deep the chain runs — no counters, no escalation.
    function resolveCascades(done) {
      const matched = findMatches();
      if (matched.size === 0) { done(); return; }
      dissolveMatches(matched, function () {
        const moves = applyGravity();
        animateGravity(moves, function () {
          resolveCascades(done);
        });
      });
    }

    // ---- Drag-to-swap (Pointer Events) ----
    // Drag a tile toward an orthogonally adjacent tile; on release the two swap
    // with a gentle animation. If the swap forms a match the matched tiles
    // dissolve; if not, the swap quietly reverts.
    const SWAP_MS = 180;          // swap / revert animation duration
    const DISSOLVE_MS = 280;      // matched-tile dissolve duration
    const FALL_MS = 260;          // per-step gravity / refill fall duration
    const AXIS_LOCK_PX = 4;       // movement before we commit to a direction
    const COMMIT_FRACTION = 0.4;  // how far to drag (of one cell) to swap
    const NUDGE_FRACTION = 0.66;  // how far the HELD jewel nudges (of one cell)

    const drag = {
      active: false,
      animating: false,
      id: null,
      axis: null,        // 'h' | 'v' once locked
      r: 0, c: 0,        // source cell
      startX: 0, startY: 0,
      step: 0,           // distance between adjacent cell centres (px)
      jewel: null,       // dragged jewel element
      cell: null,        // dragged cell element
      nJewel: null,      // current neighbour jewel element
      nr: -1, nc: -1,    // current neighbour cell
      rawT: 0,           // raw finger offset along the locked axis (uncapped)
      heldT: 0           // applied (capped) nudge offset of the held jewel
    };

    // Snap a jewel cleanly back to its home cell (used when the neighbour we are
    // pushing changes mid-gesture — e.g. the drag flips direction or hits an edge).
    function resetTile(jewel) {
      if (!jewel) return;
      jewel.style.transition = 'none';
      jewel.style.transform = '';
      jewel.style.willChange = '';
    }

    function onPointerDown(e) {
      if (paused || ended) return;
      if (drag.animating || drag.active) return;
      const cell = e.target.closest('.cell');
      if (!cell || !gameEl.contains(cell)) return;
      // Don't grab an empty cell.
      if (board[+cell.dataset.row][+cell.dataset.col] === null) return;

      drag.active = true;
      drag.id = e.pointerId;
      drag.axis = null;
      drag.rawT = 0;
      drag.heldT = 0;
      drag.nJewel = null;
      drag.nr = -1;
      drag.nc = -1;
      drag.r = +cell.dataset.row;
      drag.c = +cell.dataset.col;
      drag.startX = e.clientX;
      drag.startY = e.clientY;
      drag.cell = cell;
      drag.jewel = tiles[drag.r][drag.c];

      const rect = cell.getBoundingClientRect();
      const gap = parseFloat(getComputedStyle(gameEl).rowGap) || 0;
      drag.step = rect.width + gap;

      gameEl.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
      if (!drag.active || e.pointerId !== drag.id) return;

      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;

      // Lock to the dominant axis once we've moved enough.
      if (!drag.axis) {
        if (Math.abs(dx) < AXIS_LOCK_PX && Math.abs(dy) < AXIS_LOCK_PX) return;
        drag.axis = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
        drag.jewel.classList.add('lift');
        drag.cell.classList.add('active');
      }

      const off = drag.axis === 'h' ? dx : dy;
      const sign = off < 0 ? -1 : 1;
      const nr = drag.r + (drag.axis === 'v' ? sign : 0);
      const nc = drag.c + (drag.axis === 'h' ? sign : 0);
      const inBounds = nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS;
      const newNeighbour = inBounds ? tiles[nr][nc] : null;

      // If we're now pushing a different neighbour (drag flipped direction, or
      // moved off the board edge), snap the previous one cleanly back home.
      if (drag.nJewel && drag.nJewel !== newNeighbour) {
        resetTile(drag.nJewel);
      }

      // Raw finger travel toward the chosen neighbour (0 if there is none, e.g.
      // at the board edge). This — not the visual nudge — decides the swap.
      drag.rawT = inBounds ? off : 0;
      drag.nJewel = newNeighbour;
      drag.nr = inBounds ? nr : -1;
      drag.nc = inBounds ? nc : -1;

      // The held jewel only NUDGES a short way toward the neighbour — enough to
      // show direction/intent — so it never travels fully onto it. The neighbour
      // reacts by nudging the opposite way by the same amount, so on release both
      // have the same distance left and exchange at a matching, even speed.
      const nudgeMag = inBounds
        ? Math.min(Math.abs(off), drag.step * NUDGE_FRACTION)
        : 0;
      const nudge = sign * nudgeMag;
      drag.heldT = nudge;

      const tx = drag.axis === 'h' ? nudge : 0;
      const ty = drag.axis === 'v' ? nudge : 0;

      // Follow the finger instantly (no transition) via transform only.
      drag.jewel.style.transition = 'none';
      drag.jewel.style.transform =
        'translate3d(' + tx + 'px, ' + ty + 'px, 0) scale(1.06)';

      if (drag.nJewel) {
        drag.nJewel.style.willChange = 'transform'; // promote to its own layer
        drag.nJewel.style.transition = 'none';
        drag.nJewel.style.transform =
          'translate3d(' + (-tx) + 'px, ' + (-ty) + 'px, 0)';
      }
    }

    function onPointerUp(e) {
      if (!drag.active || e.pointerId !== drag.id) return;
      drag.active = false;
      try { gameEl.releasePointerCapture(e.pointerId); } catch (_) {}

      // A tap (never locked an axis): nothing to animate.
      if (!drag.axis) {
        drag.jewel = drag.cell = drag.nJewel = null;
        return;
      }

      const cancelled = e.type === 'pointercancel';
      const commit =
        !cancelled && drag.nJewel &&
        Math.abs(drag.rawT) > drag.step * COMMIT_FRACTION;

      const axis = drag.axis;
      const step = drag.step;
      const sign = drag.rawT < 0 ? -1 : 1;

      // Both jewels are mid-nudge: held at +heldT, neighbour at -heldT. On commit
      // they finish the exchange (held -> neighbour's cell, neighbour -> held's
      // cell); otherwise both ease back home. Because they start mirrored and
      // travel the same remaining distance, the two sides move at an even speed.
      const cHeld = drag.heldT;
      const fHeld = commit ? sign * step : 0;
      const cNbr = -drag.heldT;
      const fNbr = commit ? -sign * step : 0;

      const xy = function (v) {
        return 'translate3d(' +
          (axis === 'h' ? v : 0) + 'px, ' + (axis === 'v' ? v : 0) + 'px, 0)';
      };

      drag.animating = true;

      // Animate BOTH jewels with the Web Animations API, started in the same
      // synchronous block so they share a start time and move together as one
      // smooth exchange. Same calm pace + easing.
      const opts = { duration: SWAP_MS, easing: 'ease', fill: 'forwards' };

      drag.jewel.style.transition = 'none';
      const a1 = drag.jewel.animate([
        { transform: xy(cHeld) + ' scale(1.06)' },
        { transform: xy(fHeld) + ' scale(1)' }
      ], opts);

      let a2 = null;
      if (drag.nJewel) {
        drag.nJewel.style.willChange = 'transform'; // keep neighbour on its layer
        drag.nJewel.style.transition = 'none';
        a2 = drag.nJewel.animate([
          { transform: xy(cNbr) },
          { transform: xy(fNbr) }
        ], opts);
      }

      const r = drag.r, c = drag.c, nr = drag.nr, nc = drag.nc;

      function endGesture() {
        drag.animating = false;
        drag.jewel = drag.cell = drag.nJewel = null;
      }

      // #3: finish exactly when the animation ends (no setTimeout drift). Cancel
      // the fill-forwards effects, then reconcile ONLY the affected cells to the
      // data in the same task, so positions don't visibly jump.
      a1.onfinish = function () {
        a1.cancel();
        if (a2) a2.cancel();

        if (!commit) {
          // Didn't drag far enough (or no neighbour): just settle home.
          syncCell(r, c);
          if (nr >= 0) syncCell(nr, nc);
          endGesture();
          return;
        }

        // The first committed swap is when play truly begins — start the clock
        // here (idempotent), so it stays at 0:00 until the user's first move.
        startClock();

        // Apply the swap to the data and land both jewels in their new cells.
        const tmp = board[r][c];
        board[r][c] = board[nr][nc];
        board[nr][nc] = tmp;
        syncCell(r, c);
        syncCell(nr, nc);

        // A committed swap onto a valid neighbour always stays. Resolve any
        // matches it forms — clearing, dropping, refilling and cascading until
        // the board is stable and full again. No match just leaves it as-is.
        resolveCascades(endGesture);
      };
    }

    gameEl.addEventListener('pointerdown', onPointerDown);
    gameEl.addEventListener('pointermove', onPointerMove);
    gameEl.addEventListener('pointerup', onPointerUp);
    gameEl.addEventListener('pointercancel', onPointerUp);

    // ---- Session state: clock, pause, settings, end ----
    let paused = false;
    let ended = false;

    // Elapsed PLAY time (ms). Counts up from when play started and freezes while
    // paused, so it always reflects time actually spent playing — never a
    // countdown, never urgent.
    const clockEl = document.getElementById('clock');
    let elapsedMs = 0;
    let lastTick = Date.now();
    let clockTimer = null;

    function renderClock() {
      const total = Math.floor(elapsedMs / 1000);
      const m = Math.floor(total / 60);
      const s = total % 60;
      clockEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }
    function tickClock() {
      const now = Date.now();
      if (!paused && !ended) elapsedMs += now - lastTick;
      lastTick = now;
      renderClock();
    }
    function startClock() {
      lastTick = Date.now();
      if (clockTimer === null) clockTimer = setInterval(tickClock, 500);
    }

    // Pause / resume: stops the clock and quietly blocks board input. The board
    // dims a touch — no overlay, no clutter.
    const stageEl = document.getElementById('stage');
    const pauseBtn = document.getElementById('pause-btn');
    function setPaused(next) {
      paused = next;
      // Keep the clock from crediting the pause gap on resume.
      lastTick = Date.now();
      stageEl.classList.toggle('paused', paused);
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    }
    pauseBtn.addEventListener('click', function () {
      if (ended) return;
      setPaused(!paused);
    });

    // Settings stub: open / close the calm panel. No real controls yet.
    const settingsPanel = document.getElementById('settings-panel');
    document.getElementById('settings-btn').addEventListener('click', function () {
      settingsPanel.hidden = false;
    });
    document.getElementById('settings-close').addEventListener('click', function () {
      settingsPanel.hidden = true;
    });

    // Info / how-to-play panel: same calm style, open / close only.
    const infoPanel = document.getElementById('info-panel');
    document.getElementById('info-btn').addEventListener('click', function () {
      infoPanel.hidden = false;
    });
    document.getElementById('info-close').addEventListener('click', function () {
      infoPanel.hidden = true;
    });

    // End the session and leave play. Simple for now: stop the clock, block the
    // board, show a quiet goodbye. No "play again".
    const endScreen = document.getElementById('end-screen');
    document.getElementById('end-btn').addEventListener('click', function () {
      ended = true;
      if (clockTimer !== null) { clearInterval(clockTimer); clockTimer = null; }
      settingsPanel.hidden = true;
      endScreen.hidden = false;
    });

    // Show 0:00 and hold there until the first swap (startClock runs then).
    renderClock();

    // Register the service worker with a RELATIVE path (GitHub Pages sub-path safe).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function () {
          /* offline support is optional; ignore registration failures */
        });
      });
    }
  </script>
</body>
</html>
