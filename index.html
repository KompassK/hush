<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#efe6d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hush">
  <link rel="manifest" href="./manifest.json">
  <title>Hush</title>
  <style>
    :root {
      /* warm, soft, low-contrast palette */
      --bg-top: #f4ece0;
      --bg-bottom: #ece1cf;
      --panel: #f7f1e7;
      --ink: #9c8f7a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* keep clear of the notch / home indicator */
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    #game {
      width: min(92vw, 92vmin);
      aspect-ratio: 1 / 1;
      max-height: 92vh;
      max-height: 92dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: var(--panel);
      box-shadow:
        0 1px 2px rgba(120, 105, 80, 0.10),
        0 12px 30px rgba(120, 105, 80, 0.10);
    }

    #game .placeholder {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="game">
    <span class="placeholder">hush</span>
  </div>

  <script>
    // Register the service worker with a RELATIVE path (GitHub Pages sub-path safe).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function () {
          /* offline support is optional; ignore registration failures */
        });
      });
    }
  </script>
</body>
</html>
